services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.5-php8.2-apache
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
    volumes:
      - wp_data:/var/www/html
      - ./wordpress/themes/lavilla:/var/www/html/wp-content/themes/lavilla
      - ./wordpress/themes/lavilla-child-berck:/var/www/html/wp-content/themes/lavilla-child-berck
      - ./wordpress/plugins:/var/www/html/wp-content/plugins-local

  wpcli:
    image: wordpress:cli-2.11
    user: "33:33"
    depends_on:
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
    volumes:
      - wp_data:/var/www/html
      - ./wordpress/themes/lavilla:/var/www/html/wp-content/themes/lavilla
      - ./wordpress/themes/lavilla-child-berck:/var/www/html/wp-content/themes/lavilla-child-berck
      - ./scripts:/scripts

volumes:
  db_data:
  wp_data:
